name: Build Electron App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      platforms:
        description: 'Platforms to build: linux, win, mac (or all)'
        required: false
        default: 'all'

# Required for softprops/action-gh-release to create a release and upload assets
permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          P="${{ github.event.inputs.platforms }}"
          if [ -z "$P" ]; then P="all"; fi
          ITEMS=()
          if [ "$P" = "all" ] || [[ "$P" == *"linux"* ]]; then
            ITEMS+=('{"os":"ubuntu-latest","platform":"linux","artifact":"*.AppImage"}')
          fi
          if [ "$P" = "all" ] || [[ "$P" == *"win"* ]]; then
            ITEMS+=('{"os":"windows-latest","platform":"win","artifact":"*.exe"}')
          fi
          if [ "$P" = "all" ] || [[ "$P" == *"mac"* ]]; then
            ITEMS+=('{"os":"macos-latest","platform":"mac","artifact":"*.dmg"}')
          fi
          JOINED=$(IFS=,; echo "${ITEMS[*]}")
          echo "matrix={\"include\":[$JOINED]}" >> $GITHUB_OUTPUT

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      # naudiodon requires ALSA headers on Linux.
      # libopus-dev provides Opus headers if libopus-node compiles from source.
      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libopus-dev

      # npm ci uses package-lock.json for a clean, reproducible install.
      # The postinstall script (electron-builder install-app-deps) automatically
      # rebuilds native modules (naudiodon, libopus-node) for the Electron ABI
      # on the current platform.
      - name: Install dependencies
        run: npm ci

      - name: Compile CW key helper (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: gcc -O2 -o bin/linux/cw-key-helper cw-key-helper.c

      - name: Compile CW key helper (macOS)
        if: matrix.os == 'macos-latest'
        run: clang -O2 -o bin/mac/cw-key-helper cw-key-helper.c

      - name: Set up MSVC (Windows)
        if: matrix.os == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Compile CW key helper (Windows)
        if: matrix.os == 'windows-latest'
        shell: cmd
        run: cl cw-key-helper.c /Fe:bin\windows\cw-key-helper.exe /O2 /nologo

      - name: Build rigctld (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: node scripts/build-rigctld.mjs

      - name: Check rigctld binary (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          if (Test-Path "bin\windows\rigctld.exe") {
            Write-Host "[rigctld] Binary already exists at bin\windows\rigctld.exe — skipping build."
            echo "RIGCTLD_EXISTS=true" >> $env:GITHUB_ENV
          } else {
            Write-Host "[rigctld] Binary not found — will build via MSYS2."
            echo "RIGCTLD_EXISTS=false" >> $env:GITHUB_ENV
          }

      - name: Set up MSYS2 for rigctld build (Windows)
        if: matrix.os == 'windows-latest' && env.RIGCTLD_EXISTS != 'true'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          install: >-
            base-devel
            git
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-glib2
            mingw-w64-x86_64-pkg-config

      - name: Build rigctld (Windows MSYS2)
        if: matrix.os == 'windows-latest' && env.RIGCTLD_EXISTS != 'true'
        shell: msys2 {0}
        run: |
          set -e
          git clone --depth=1 https://github.com/Hamlib/Hamlib.git hamlib-src
          cd hamlib-src
          autoreconf -fi
          ./configure --disable-shared --enable-static --without-python --without-lua --without-tcl --without-perl --without-cxx-binding LDFLAGS="-static -static-libgcc -static-libstdc++"
          make -j$(nproc)
          mkdir -p ../bin/windows
          cp src/rigctld.exe ../bin/windows/rigctld.exe
          cd ..
          rm -rf hamlib-src

      # --publish never prevents electron-builder from trying to upload to GitHub
      # Releases itself (it lacks a token). The next two steps handle publishing.
      - name: Build
        run: npm run electron:build -- --${{ matrix.platform }} ${{ matrix.platform == 'mac' && '--arm64' || '' }} --publish never

      # Upload as a workflow artifact (useful for inspecting builds without a release)
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: rigcontrol-web-${{ matrix.platform }}
          path: build/${{ matrix.artifact }}

      # Attach the installer to the GitHub Release — only runs on tag pushes, not manual dispatches
      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: build/${{ matrix.artifact }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
